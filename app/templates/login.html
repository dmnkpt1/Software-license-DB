{% extends "base.html" %}

{% block title %}Choose Role{% endblock %}

{% block content %}
<section class="grid login-grid">
    <article class="card">
        <h3>{{ roles["client"] }}</h3>
        <form method="post" action="/login">
            <input type="hidden" name="role" value="client">
            <label>
                Client Name
                <select name="client_id" required>
                    <option value="">Select client</option>
                    {% for client in clients %}
                        <option value="{{ client.client_id }}">{{ client.contact_name }}</option>
                    {% endfor %}
                </select>
            </label>
            <button type="submit" class="button">Continue as Client</button>
        </form>
    </article>
    <article class="card">
        <h3>{{ roles["license_manager"] }}</h3>
        <form method="post" action="/login">
            <input type="hidden" name="role" value="license_manager">
            <button type="submit" class="button">Continue as License Manager</button>
        </form>
    </article>
</section>
{% endblock %}
