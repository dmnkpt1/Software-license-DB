{% extends "base.html" %}

{% block title %}Client Dashboard{% endblock %}

{% block content %}
<section class="hero">
    <div>
        <h2>Client dashboard</h2>
    </div>
</section>

<section class="grid">
    <article class="card">
        <h3>My Licenses</h3>
        <a class="button" href="/licenses">Open licenses</a>
